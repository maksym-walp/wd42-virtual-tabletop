services:
  postgres:
    image: postgres:16-alpine
    container_name: walp-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    # No ports exposed — only accessible inside walp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - walp-network

  adminer:
    image: adminer:4-standalone
    container_name: walp-adminer
    restart: always
    environment:
      # Sets the Server field only — Adminer has no env var for the DB driver,
      # so the System dropdown still defaults to MySQL. Reach PostgreSQL directly
      # with http://localhost:8080/?pgsql=postgres&username=...&db=...
      ADMINER_DEFAULT_SERVER: ${POSTGRES_HOST:-postgres}
      # Must name a directory under /var/www/html/designs in the image, and that
      # design must be self-contained: the image ships only each design's
      # adminer.css, with no fonts/ or images/ dirs, so themes referencing
      # ../fonts/entypo.woff (bilal-dark, dracula, ...) render every icon as "?".
      # Known-good: pepa-linha, flat, nette, rmsoft_blue, hever.
      ADMINER_DESIGN: ${ADMINER_DESIGN:-pepa-linha}
    # Bound to loopback by default — reachable only through an SSH tunnel.
    # Set ADMINER_BIND to a LAN IP (e.g. 192.168.1.10) to expose it on the local network.
    ports:
      - "${ADMINER_BIND:-127.0.0.1}:${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  auth:
    build:
      context: ./services/auth
      target: production
    container_name: walp-auth
    restart: always
    env_file: .env
    environment:
      PORT: 3001
      NODE_ENV: production
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  user-profile:
    build:
      context: ./services/user-profile
      target: production
    container_name: walp-user-profile
    restart: always
    env_file: .env
    environment:
      PORT: 3002
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  spellbook:
    build:
      context: ./services/spellbook
      target: production
    container_name: walp-spellbook
    restart: always
    env_file: .env
    environment:
      PORT: 3003
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  skill-tree:
    build:
      context: ./services/skill-tree
      target: production
    container_name: walp-skill-tree
    restart: always
    env_file: .env
    environment:
      PORT: 3004
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  character-sheet:
    build:
      context: ./services/character-sheet
      target: production
    container_name: walp-character-sheet
    restart: always
    env_file: .env
    environment:
      PORT: 3005
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  dice-roller:
    build:
      context: ./services/dice-roller
      target: production
    container_name: walp-dice-roller
    restart: always
    env_file: .env
    environment:
      PORT: 3006
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  equipment:
    build:
      context: ./services/equipment
      target: production
    container_name: walp-equipment
    restart: always
    env_file: .env
    environment:
      PORT: 3007
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  maneuvers:
    build:
      context: ./services/maneuvers
      target: production
    container_name: walp-maneuvers
    restart: always
    env_file: .env
    environment:
      PORT: 3008
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  abilities:
    build:
      context: ./services/abilities
      target: production
    container_name: walp-abilities
    restart: always
    env_file: .env
    environment:
      PORT: 3009
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  campaigns:
    build:
      context: ./services/campaigns
      target: production
    container_name: walp-campaigns
    restart: always
    env_file: .env
    environment:
      PORT: 3010
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  artifacts:
    build:
      context: ./services/artifacts
      target: production
    container_name: walp-artifacts
    restart: always
    env_file: .env
    environment:
      PORT: 3011
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  # Єдиний сервіс без depends_on postgres — він stateless. Так само єдиний
  # prod-сервіс із volumes: правило «без volumes у prod» стосується
  # bind-монтування вихідників, а не named volume зі сховищем файлів.
  media:
    build:
      context: ./services/media
      target: production
    container_name: walp-media
    restart: always
    env_file: .env
    environment:
      PORT: 3012
      NODE_ENV: production
    volumes:
      - media_data:/uploads
    networks:
      - walp-network

  frontend:
    build:
      context: ./services/frontend
      target: production
    container_name: walp-frontend
    restart: always
    networks:
      - walp-network

  nginx:
    image: nginx:1.25-alpine
    container_name: walp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
      # Той самий volume, що й у media — nginx віддає /uploads/ як статику,
      # повз Node. Read-only: nginx лише читає, пише виключно media-service.
      - media_data:/uploads:ro
    depends_on:
      - auth
      - user-profile
      - spellbook
      - skill-tree
      - character-sheet
      - dice-roller
      - equipment
      - maneuvers
      - abilities
      - campaigns
      - artifacts
      - media
      - frontend
    networks:
      - walp-network

volumes:
  postgres_data:
  media_data:

networks:
  walp-network:
    driver: bridge
