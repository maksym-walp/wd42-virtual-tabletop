      context: ./services/character-sheet
      target: production
    container_name: walp-character-sheet
    restart: always
    env_file: .env
    environment:
      PORT: 3005
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  dice-roller:
    build:
      context: ./services/dice-roller
      target: production
    container_name: walp-dice-roller
    restart: always
    env_file: .env
    environment:
      PORT: 3006
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  equipment:
    build:
      context: ./services/equipment
      target: production
    container_name: walp-equipment
    restart: always
    env_file: .env
    environment:
      PORT: 3007
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  maneuvers:
    build:
      context: ./services/maneuvers
      target: production
    container_name: walp-maneuvers
    restart: always
    env_file: .env
    environment:
      PORT: 3008
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  abilities:
    build:
      context: ./services/abilities
      target: production
    container_name: walp-abilities
    restart: always
    env_file: .env
    environment:
      PORT: 3009
