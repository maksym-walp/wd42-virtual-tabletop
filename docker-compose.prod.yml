  frontend:
    build:
      context: ./services/frontend
      target: production
    container_name: walp-frontend
    restart: always
    networks:
      - walp-network

  nginx:
    image: nginx:1.25-alpine
    container_name: walp-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - auth
      - user-profile
      - spellbook
      - skill-tree
      - character-sheet
      - dice-roller
      - equipment
      - maneuvers
      - abilities
      - campaigns
      - artifacts
      - frontend
    networks:
      - walp-network

volumes:
  postgres_data:

networks:
  walp-network:
    driver: bridge
