services:
  postgres:
    image: postgres:16-alpine
    container_name: walp-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    # No ports exposed — only accessible inside walp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - walp-network

  auth:
    build:
      context: ./services/auth
      target: production
    container_name: walp-auth
    restart: always
    env_file: .env
    environment:
      PORT: 3001
      NODE_ENV: production
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  user-profile:
    build:
      context: ./services/user-profile
      target: production
    container_name: walp-user-profile
    restart: always
    env_file: .env
    environment:
      PORT: 3002
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  spellbook:
    build:
      context: ./services/spellbook
      target: production
    container_name: walp-spellbook
    restart: always
    env_file: .env
    environment:
      PORT: 3003
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  skill-tree:
    build:
      context: ./services/skill-tree
      target: production
    container_name: walp-skill-tree
    restart: always
    env_file: .env
    environment:
      PORT: 3004
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  character-sheet:
