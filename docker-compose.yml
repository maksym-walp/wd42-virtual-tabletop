services:
  postgres:
    image: postgres:16-alpine
    container_name: walp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"  # remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - walp-network

  adminer:
    image: adminer:4-standalone
    container_name: walp-adminer
    restart: unless-stopped
    environment:
      # Sets the Server field only — Adminer has no env var for the DB driver,
      # so the System dropdown still defaults to MySQL. Reach PostgreSQL directly
      # with http://localhost:8080/?pgsql=postgres&username=...&db=...
      ADMINER_DEFAULT_SERVER: ${POSTGRES_HOST:-postgres}
      # Must name a directory under /var/www/html/designs in the image, and that
      # design must be self-contained: the image ships only each design's
      # adminer.css, with no fonts/ or images/ dirs, so themes referencing
      # ../fonts/entypo.woff (bilal-dark, dracula, ...) render every icon as "?".
      # Known-good: pepa-linha, flat, nette, rmsoft_blue, hever.
      ADMINER_DESIGN: ${ADMINER_DESIGN:-rmsoft_blue}
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  auth:
    build:
      context: ./services/auth
      target: development
    container_name: walp-auth
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3001
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-}
    volumes:
      - ./services/auth/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  user-profile:
    build:
      context: ./services/user-profile
      target: development
    container_name: walp-user-profile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3002
    volumes:
      - ./services/user-profile/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  spellbook:
    build:
      context: ./services/spellbook
      target: development
    container_name: walp-spellbook
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3003
    volumes:
      - ./services/spellbook/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  skill-tree:
    build:
      context: ./services/skill-tree
      target: development
    container_name: walp-skill-tree
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3004
    volumes:
      - ./services/skill-tree/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  character-sheet:
    build:
      context: ./services/character-sheet
      target: development
    container_name: walp-character-sheet
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3005
    volumes:
      - ./services/character-sheet/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  dice-roller:
    build:
      context: ./services/dice-roller
      target: development
    container_name: walp-dice-roller
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3006
    volumes:
      - ./services/dice-roller/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  equipment:
    build:
      context: ./services/equipment
      target: development
    container_name: walp-equipment
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3007
    volumes:
      - ./services/equipment/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  maneuvers:
    build:
      context: ./services/maneuvers
      target: development
    container_name: walp-maneuvers
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3008
    volumes:
      - ./services/maneuvers/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  abilities:
    build:
      context: ./services/abilities
      target: development
    container_name: walp-abilities
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3009
    volumes:
      - ./services/abilities/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  campaigns:
    build:
      context: ./services/campaigns
      target: development
    container_name: walp-campaigns
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3010
    volumes:
      - ./services/campaigns/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  artifacts:
    build:
      context: ./services/artifacts
      target: development
    container_name: walp-artifacts
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3011
    volumes:
      - ./services/artifacts/src:/app/src:delegated
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - walp-network

  # Єдиний сервіс без depends_on postgres — він stateless, уся метаінформація
  # про файли живе в БД інших сервісів (campaign_gallery, characters.image_url).
  media:
    build:
      context: ./services/media
      target: development
    container_name: walp-media
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3012
    volumes:
      - ./services/media/src:/app/src:delegated
      - media_data:/uploads
    networks:
      - walp-network

  frontend:
    build:
      context: ./services/frontend
      target: development
    container_name: walp-frontend
    restart: unless-stopped
    volumes:
      - ./services/frontend/src:/app/src:delegated
    networks:
      - walp-network

  nginx:
    image: nginx:1.25-alpine
    container_name: walp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Той самий volume, що й у media — nginx віддає /uploads/ як статику,
      # повз Node. Read-only: nginx лише читає, пише виключно media-service.
      - media_data:/uploads:ro
    depends_on:
      - auth
      - user-profile
      - spellbook
      - skill-tree
      - character-sheet
      - dice-roller
      - equipment
      - maneuvers
      - abilities
      - campaigns
      - artifacts
      - media
      - frontend
    networks:
      - walp-network

volumes:
  postgres_data:
  media_data:

networks:
  walp-network:
    driver: bridge
