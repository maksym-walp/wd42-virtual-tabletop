events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream auth_service {
        server auth:3001;
    }

    upstream user_profile_service {
        server user-profile:3002;
    }

    upstream spellbook_service {
        server spellbook:3003;
    }

    upstream skill_tree_service {
        server skill-tree:3004;
    }

    upstream character_sheet_service {
        server character-sheet:3005;
    }

    upstream dice_roller_service {
        server dice-roller:3006;
    }

    upstream equipment_service {
        server equipment:3007;
    }

    upstream maneuvers_service {
        server maneuvers:3008;
    }

    upstream abilities_service {
        server abilities:3009;
    }

    upstream campaigns_service {
        server campaigns:3010;
    }

    upstream artifacts_service {
        server artifacts:3011;
    }

    upstream media_service {
        server media:3012;
    }

    upstream frontend_service {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;


        # Auth service — /api/auth/* → auth:3001/*
        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # User profile service — /api/profile/* → user-profile:3002/*
        location /api/profile/ {
            proxy_pass http://user_profile_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Spellbook service — /api/spellbook/* → spellbook:3003/*
        location /api/spellbook/ {
            proxy_pass http://spellbook_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Skill Tree service — /api/skill-tree/* → skill-tree:3004/*
        location /api/skill-tree/ {
            proxy_pass http://skill_tree_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Character Sheet service — /api/characters/* → character-sheet:3005/*
        location /api/characters/ {
            proxy_pass http://character_sheet_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Dice Roller service — /api/dice/* → dice-roller:3006/*
        location /api/dice/ {
            proxy_pass http://dice_roller_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Equipment service — /api/equipment/* → equipment:3007/*
        location /api/equipment/ {
            proxy_pass http://equipment_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Maneuvers service — /api/maneuvers/* → maneuvers:3008/*
        location /api/maneuvers/ {
            proxy_pass http://maneuvers_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Abilities service — /api/abilities/* → abilities:3009/*
        location /api/abilities/ {
            proxy_pass http://abilities_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Campaigns service — /api/campaigns/* → campaigns:3010/*
        location /api/campaigns/ {
            proxy_pass http://campaigns_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Artifacts service — /api/artifacts/* → artifacts:3011/*
        location /api/artifacts/ {
            proxy_pass http://artifacts_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Media service — /api/media/* → media:3012/*
        # 12m (не 10m) покриває multipart-обгортку навколо 10 МБ файлу.
        # Свідомо в межах цього location: усі інші ендпоінти лишаються на
        # дефолтному 1m, тож піднятий ліміт недосяжний деінде.
        location /api/media/ {
            client_max_body_size 12m;
            proxy_pass http://media_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Завантажені зображення — напряму з volume media_data, повз Node.
        # alias, а не root: root /uploads дав би /uploads/uploads/x.png.
        # Обидва слеші (в location і в alias) є значущими.
        location /uploads/ {
            alias /uploads/;
            access_log off;

            # Імена файлів — випадкові UUID, тож байти за конкретною URL
            # ніколи не змінюються; заміна зображення = нова URL.
            # Без `expires` — воно додало б власний Cache-Control поруч із цим,
            # і відповідь мала б два суперечливі заголовки.
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Content-Type-Options "nosniff";

            # media-service пише лише ці чотири розширення. Фіксація мапи
            # типів тут означає, що несподіваний файл не буде відданий як
            # text/html чи image/svg+xml і виконаний в origin застосунку.
            types {
                image/jpeg jpg jpeg;
                image/png  png;
                image/webp webp;
                image/gif  gif;
            }
            default_type application/octet-stream;

            try_files $uri =404;
        }

        # Frontend with WebSocket support for Vite HMR
        location / {
            proxy_pass http://frontend_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
