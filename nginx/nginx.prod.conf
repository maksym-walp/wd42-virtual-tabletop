events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Resolved once at nginx startup and cached for the container's lifetime.
    # A redeployed backend container gets a new internal IP, so nginx must be
    # restarted after any deploy that recreates backend containers — the CI
    # deploy workflow does this automatically on every run.
    upstream auth_service {
        server auth:3001;
    }

    upstream user_profile_service {
        server user-profile:3002;
    }

    upstream spellbook_service {
        server spellbook:3003;
    }

    upstream skill_tree_service {
        server skill-tree:3004;
    }

    upstream character_sheet_service {
        server character-sheet:3005;
    }

    upstream dice_roller_service {
        server dice-roller:3006;
    }

    upstream equipment_service {
        server equipment:3007;
    }

    upstream maneuvers_service {
        server maneuvers:3008;
    }

    upstream abilities_service {
        server abilities:3009;
    }

    upstream campaigns_service {
        server campaigns:3010;
    }

    upstream frontend_service {
        server frontend:5173;
    }

    # Redirect HTTP to HTTPS, except ACME HTTP-01 challenge for certbot renewal
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name walpapur.com;  # change to your domain, e.g. example.com

        ssl_certificate /etc/letsencrypt/live/walpapur.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/walpapur.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/auth/ {
            proxy_pass http://auth_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/profile/ {
            proxy_pass http://user_profile_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/spellbook/ {
            proxy_pass http://spellbook_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/skill-tree/ {
            proxy_pass http://skill_tree_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/characters/ {
            proxy_pass http://character_sheet_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/dice/ {
            proxy_pass http://dice_roller_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/equipment/ {
            proxy_pass http://equipment_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/maneuvers/ {
            proxy_pass http://maneuvers_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/abilities/ {
            proxy_pass http://abilities_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Campaigns service — /api/campaigns/* → campaigns:3010/*
        location /api/campaigns/ {
            proxy_pass http://campaigns_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass http://frontend_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
