events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker's embedded DNS. Using it (instead of static upstream {} blocks,
    # which resolve once at nginx startup and cache forever) means nginx
    # re-resolves each backend hostname on every request, so a redeployed
    # container (new internal IP) doesn't leave nginx stuck proxying to a
    # dead address until nginx itself is restarted.
    resolver 127.0.0.11 valid=10s;

    # Redirect HTTP to HTTPS, except ACME HTTP-01 challenge for certbot renewal
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name walpapur.com;  # change to your domain, e.g. example.com

        ssl_certificate /etc/letsencrypt/live/walpapur.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/walpapur.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /api/auth/ {
            set $backend http://auth:3001;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/profile/ {
            set $backend http://user-profile:3002;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/spellbook/ {
            set $backend http://spellbook:3003;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/skill-tree/ {
            set $backend http://skill-tree:3004;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/characters/ {
            set $backend http://character-sheet:3005;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/dice/ {
            set $backend http://dice-roller:3006;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/equipment/ {
            set $backend http://equipment:3007;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location /api/maneuvers/ {
            set $backend http://maneuvers:3008;
            proxy_pass $backend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            set $backend http://frontend:5173;
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
